<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Buddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">

    <!-- LEFT -->

    <div class="left">

      <h1 class="logo">Run Buddy</h1>

      <p class="subtitle">
        your pace. your playlist.
      </p>

      <div class="form-group">
        <label>height</label>
        <input id="height" class="input" placeholder="65 inches"/>
      </div>

      <div class="form-group">
        <label>mile time</label>
        <input id="mileTime" class="input" placeholder="8:30"/>
      </div>

      <div class="form-group">
        <label>genre</label>

        <select id="genreSelect"  class="input">
          <option>pop</option>
          <option>indie</option>
          <option>rock</option>
          <option>hip-hop</option>
          <option>electronic</option>
        </select>
      </div>

      <button id="generateBtn" class="generate-btn">
        generate playlist
      </button>

      <p class="small-text">
        we’ll match songs to your ideal running cadence
      </p>

    </div>

    <!-- RIGHT -->

    <div class="right">

      <h2 class="playlist-title">
        Your Run Playlist
      </h2>

      <div id="result" class="bpm">
      </div>

      <div id="cadences" class="cadence">
      </div>

      <div id="songList" class="song-list">


        <div class="song">

          <div class="song-left">

            <div class="album"></div>

            <div class="song-info">
              <h3>Levitating</h3>
              <p>Dua Lipa</p>
            </div>

          </div>

          <div class="song-bpm">
            92 BPM
          </div>

        </div>

        <div class="song">

          <div class="song-left">

            <div class="album"></div>

            <div class="song-info">
              <h3>Blinding Lights</h3>
              <p>The Weeknd</p>
            </div>

          </div>

          <div class="song-bpm">
            86 BPM
          </div>

        </div>

      </div>

      <button class="spotify-btn">
        open in spotify
      </button>

    </div>
    </div>
      <script type="module" src="script.js"></script>
</body>
</html>
