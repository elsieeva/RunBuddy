<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Buddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- LEFT -->

    <div class="left">

      <h1 class="logo">Run Buddy</h1>

      <p class="subtitle">
        your pace. your playlist.
      </p>

      <div class="form-group">
        <label>height</label>
        <input id="height" class="input" placeholder="65 inches"/>
      </div>

      <div class="form-group">
        <label>mile time</label>
        <input id="mileTime" class="input" placeholder="8:30"/>
      </div>

      <div class="form-group">
        <label>genre</label>

        <select id="genreSelect"  class="input">
          <option>pop</option>
          <option>indie</option>
          <option>rock</option>
          <option>hip-hop</option>
          <option>electronic</option>
        </select>
      </div>

      <button id="generateBtn" class="generate-btn">
        generate playlist
      </button>

      <p class="small-text">
        we’ll match songs to your ideal running cadence
      </p>

    </div>

    <!-- RIGHT -->

<div class="right">

  <div class="playlist-header">
    <div class="playlist-title">Your Playlist</div>
    <div class="bpm" id="result">---</div>
    <div class="cadence" id="cadences">---</div>
  </div>

  <div id="songList" class="song-list"></div>
      <button class="spotify-btn">
        open in spotify
      </button>
</div>



    </div>
      <script type="module" src="script.js"></script>
</body>
</html>
