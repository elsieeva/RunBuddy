<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Buddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
  font-family:'DM Sans', sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(
    135deg,
    #24352d,
    #2E3B32
  );
  padding:40px;
  color:white;
}

/* MAIN CONTAINER */

.container{
  width:1200px;
  min-height:800px;

  display:flex;
  gap:70px;

  background:rgba(255,255,255,0.03);
  border-radius:32px;

  padding:60px;

  backdrop-filter:blur(10px);
}

/* LEFT SIDE */

.left{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.logo{
  font-size:92px;
  font-weight:700;
  line-height:0.9;
  margin-bottom:24px;
  letter-spacing: -5px;
  text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

.subtitle{
  font-size:24px;
  color:#D3D38F;
  margin-bottom:55px;
  font-weight:500;
}

.form-group{
  margin-bottom:28px;
}

.form-group label{
  display:block;
  margin-bottom:10px;
  font-size:18px;
  font-weight:500;
}

.input{
  width:100%;
  height:58px;
  border:none;
  border-radius:10px;
  background:#4D584C;

  padding:0 22px;

  color:white;
  font-size:20px;

  outline:none;

  transition:0.2s;
}

.generate-btn{
  margin-top:18px;
  height:72px;

  border:none;
  border-radius:10px;

  background:white;
  color:#425248;

  font-size:28px;
  font-weight:700;

  cursor:pointer;
}

.small-text{
  margin-top:22px;
  color:#d6d4b8;
  font-size:15px;
  line-height:1.5;
}

/* RIGHT SIDE */

.right{
  
  width:460px;

  background:#747C63;

  border-radius:30px;

  padding:40px;

  display:flex;
  flex-direction:column;
  box-shadow: inset 0px 4px 4px 2px rgba(0, 0, 0, 0.25);
}

.playlist-title{
  letter-spacing: -2px;
  font-size:40px;
  margin-bottom:12px;
}

.bpm{
  letter-spacing: -2px;
  font-size:56px;
  margin-bottom:12px;
  color: #D3D38F;
  font-weight: 700;
}

.cadence{
  font-size:17px;
  margin-bottom:36px;
}

.song-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.song{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 0;

  border-bottom:1px solid rgba(255,255,255,0.15);
}

.song-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.album{
  width:56px;
  height:56px;

  border-radius:14px;

  background:#5d6656;
}

.song-info h3{
  font-size:20px;
  margin-bottom:4px;
}

.song-info p{
  font-size:15px;
  opacity:0.8;
}

.song-bpm{
  font-size:18px;
  font-weight:700;
  color:#D3D38F;
}

.spotify-btn{
  margin-top:30px;
  height:68px;

  border:none;
  border-radius:20px;

  background:#5B6354;

  color:white;

  font-size:22px;
  font-weight:600;

  cursor:pointer;
}

  </style>
</head>

<body>
  <div class="container">

    <!-- LEFT -->

    <div class="left">

      <h1 class="logo">Run Buddy</h1>

      <p class="subtitle">
        your pace. your playlist.
      </p>

      <div class="form-group">
        <label>height</label>
        <input class="input" placeholder="65 inches"/>
      </div>

      <div class="form-group">
        <label>mile time</label>
        <input class="input" placeholder="8:30"/>
      </div>

      <div class="form-group">
        <label>genre</label>

        <select class="input">
          <option>pop</option>
          <option>indie</option>
          <option>rock</option>
          <option>hip-hop</option>
          <option>electronic</option>
        </select>
      </div>

      <button class="generate-btn">
        generate playlist
      </button>

      <p class="small-text">
        we’ll match songs to your ideal running cadence
      </p>

    </div>

    <!-- RIGHT -->

    <div class="right">

      <h2 class="playlist-title">
        Your Run Playlist
      </h2>

      <div class="bpm">
        84–92 BPM
      </div>

      <div class="cadence">
        cadence: 168–184 steps/min
      </div>

      <div class="song-list">

        <div class="song">

          <div class="song-left">

            <div class="album"></div>

            <div class="song-info">
              <h3>good 4 u</h3>
              <p>Olivia Rodrigo</p>
            </div>

          </div>

          <div class="song-bpm">
            90 BPM
          </div>

        </div>

        <div class="song">

          <div class="song-left">

            <div class="album"></div>

            <div class="song-info">
              <h3>Levitating</h3>
              <p>Dua Lipa</p>
            </div>

          </div>

          <div class="song-bpm">
            92 BPM
          </div>

        </div>

        <div class="song">

          <div class="song-left">

            <div class="album"></div>

            <div class="song-info">
              <h3>Blinding Lights</h3>
              <p>The Weeknd</p>
            </div>

          </div>

          <div class="song-bpm">
            86 BPM
          </div>

        </div>

      </div>

      <button class="spotify-btn">
        open in spotify
      </button>

    </div>
    </div>
</body>
</html>
